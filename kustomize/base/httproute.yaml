apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: incident-api-route
  namespace: incident-api
  labels:
    app.kubernetes.io/part-of: incident-api-demo
spec:
  parentRefs:
    - name: incident-api-gateway
  hostnames:
    - incidents.apps.REPLACE_CLUSTER_DOMAIN
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: incident-api
          port: 3000
    - matches:
        - path:
            type: Exact
            value: /healthz
      backendRefs:
        - name: incident-api
          port: 3000
