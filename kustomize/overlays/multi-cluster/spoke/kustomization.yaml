apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base
  - dns-policy.yaml
# Uncomment to include Apicurio Registry:
# components:
#   - ../../../components/apicurio
images:
  - name: quay.io/REPLACE_ORG/incident-api
    newName: quay.io/jefrankl/incident-api
    newTag: latest
patches:
  - path: patches/httproute-hostname.yaml
  - path: patches/gateway-hostname.yaml
# DNS provider credentials for Route53 — override literals with real values
# or create the secret manually: oc create secret generic aws-route53-credentials ...
secretGenerator:
  - name: aws-route53-credentials
    namespace: incident-api
    type: kuadrant.io/aws
    literals:
      - AWS_ACCESS_KEY_ID=REPLACE_AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY=REPLACE_AWS_SECRET_ACCESS_KEY
      - AWS_REGION=us-east-1
generatorOptions:
  disableNameSuffixHash: true
