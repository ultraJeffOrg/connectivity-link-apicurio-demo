# Red Hat build of Apicurio Registry 3.1
---
apiVersion: v1
kind: Namespace
metadata:
  name: apicurio-registry
  labels:
    app.kubernetes.io/part-of: incident-api-demo
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: apicurio-registry
  namespace: apicurio-registry
spec:
  targetNamespaces:
    - apicurio-registry
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: service-registry-operator
  namespace: apicurio-registry
spec:
  channel: "3.x"
  name: service-registry-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
